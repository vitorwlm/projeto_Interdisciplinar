<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../styles/styles.css">
    <title> UniCo - Criar Conta</title>
</head>

<body class="auth-page">
    <main class="auth-shell">
        <header class="auth-header">
            <a class="app-btn app-btn--light" href="../index.html">Voltar</a>
            <div class="auth-brand">
                <img class="auth-logo" src="../assets/icons/logo.svg" alt="UniCo Logo">
            </div>
            <span aria-hidden="true"></span>
        </header>

        <section class="auth-card" aria-label="Formulário de registo">
            <h1 class="section-title">Criar Nova Conta</h1>
            <p class="section-copy" style="color: var(--muted); margin-top: 0.75rem;">
                Junta-te à comunidade de economia circular do teu campus.
            </p>

            <form id="register-form" class="form-stack">
                <div class="field">
                    <label class="field-label" for="name">Nome Completo</label>
                    <input class="app-input" type="text" id="name" placeholder="O teu nome e apelido" required>
                </div>

                <div class="field">
                    <label class="field-label" for="email">E-mail Académico</label>
                    <input class="app-input" type="email" id="email" placeholder="utilizador@esmad.ipp.pt" required>
                </div>

                <div class="field">
                    <label class="field-label" for="university">Campus / Escola Principal</label>
                    <select id="university" class="app-select" required>
                        <option value="" disabled selected>Seleciona o teu campus</option>
                        <option value="ESMAD">ESMAD (Vila do Conde / Póvoa)</option>
                        <option value="ISEP">ISEP (Porto)</option>
                        <option value="ISCAP">ISCAP (S. Mamede de Infesta)</option>
                        <option value="ESE">ESE (Porto)</option>
                        <option value="ESTG">ESTG (Felgueiras)</option>
                        <option value="ESMAE">ESMAE (Porto)</option>
                        <option value="ESS">ESS (Porto)</option>
                    </select>
                </div>

                <div class="field">
                    <label class="field-label" for="password">Palavra-passe</label>
                    <input class="app-input" type="password" id="password" placeholder="Mínimo de 6 caracteres" minlength="6" required>
                </div>

                <button type="submit" class="app-btn app-btn--primary app-btn--full">Criar Conta</button>
            </form>

            <p class="auth-footer">
                Já tens uma conta?
                <a href="login.html" class="text-accent">Inicia sessão aqui</a>
            </p>
        </section>
    </main>

    <script type="module" src="../js/pages/auth.js"></script>
</body>

</html>
