<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="../styles/bulma.css">
    <title> UniCo - Criar Conta</title>
</head>

<body>

    <section class="hero is-primary is-fullheight has-background-primary">
        <div class="hero-body ">
            <div class="container">
                <div class="columns is-centered">
                    <div class="column is-8-tablet is-5-desktop">
                        <div class="is-flex is-justify-content-center mb-5">
                            <figure class="image is-128x128">
                                <img src="../assets/icons/logo.svg " alt="UniCo Logo">
                            </figure>
                        </div>

                        <div class="card has-background-white ">
                            <div class="card-content">
                                <h1 class="title is-4 has-text-centered has-text-primary">Criar Nova Conta</h1>
                                <p class="subtitle is-6 mt-4 has-text-centered mb-5 has-text-dark ">Junta-te à
                                    comunidade de economia
                                    circular do teu campus.</p>

                                <form id="register-form">
                                    <div class="field">
                                        <label class="label has-text-black" for="name">Nome Completo</label>
                                        <div class="control">
                                            <input class="input has-background-light" type="text" id="name"
                                                placeholder="O teu nome e apelido" required>
                                        </div>
                                    </div>

                                    <div class="field">
                                        <label class="label has-text-black" for="email">E-mail Académico</label>
                                        <div class="control">
                                            <input class="input has-background-light" type="email" id="email"
                                                placeholder="utilizador@esmad.ipp.pt" required>
                                        </div>
                                    </div>

                                    <div class="field">
                                        <label class="label has-text-black" for="campus">Campus / Escola Principal</label>
                                        <div class="control">
                                            <div class="select is-fullwidth">
                                                <select id="university" class="has-background-light" required>
                                                    <option value="" disabled selected>Seleciona o teu campus</option>
                                                    <option value="ESMAD">ESMAD (Vila do Conde / Póvoa)</option>
                                                    <option value="ISEP">ISEP (Porto)</option>
                                                    <option value="ISCAP">ISCAP (S. Mamede de Infesta)</option>
                                                    <option value="ESE">ESE (Porto)</option>
                                                    <option value="ESTG">ESTG (Felgueiras)</option>
                                                    <option value="ESMAE">ESMAE (Porto)</option>
                                                    <option value="ESS">ESS (Porto)</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="field">
                                        <label class="label has-text-black for="password">Palavra-passe</label>
                                        <div class="control">
                                            <input class="input has-background-light" type="password" id="password"
                                                placeholder="Mínimo de 6 caracteres" minlength="6" required>
                                        </div>
                                    </div>

                                    <div class="field mt-5">
                                        <div class="control">
                                            <button type="submit" class="button is-primary is-fullwidth has-text-white">Criar
                                                Conta</button>
                                        </div>
                                    </div>
                                </form>

                                <div class="has-text-centered mt-4">
                                    <p class="is-size-7 has-text-dark">Já tens uma conta? <a href="login.html"
                                            class="has-text-primary">Inicia sessão aqui</a></p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="../js/auth.js"></script>
</body>

</html>
