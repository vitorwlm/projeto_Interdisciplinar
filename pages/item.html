<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../styles/styles.css">
    <title>UniCo - Anúncio</title>
    <meta name="description" content="Detalhes do anúncio na UniCo — compra e vende artigos na tua comunidade universitária.">
</head>

<body class="app-page">
    <main class="page-shell" id="main-content" style="padding: 24px 0 96px;">
        <header class="page-toolbar" style="margin-bottom: 18px;">
            <a class="app-btn app-btn--ghost" href="dashboard.html">Voltar</a>
            <button data-logout-btn class="app-btn app-btn--light" type="button">Sair</button>
        </header>

        <div id="item-status" class="app-alert app-alert--neutral app-alert--center" style="margin-bottom: 18px;">
            A carregar anúncio...
        </div>

        <section class="detail-grid">
            <figure class="detail-figure">
                <img id="item-image" src="../assets/icons/logo.svg" alt="Anúncio">
            </figure>

            <article class="panel detail-card">
                <h1 id="item-title" class="detail-title">Anúncio</h1>
                <p id="item-description" class="detail-copy" style="margin-top: 0.75rem;">A carregar descrição...</p>
                <p class="detail-price" id="item-price">--</p>
                <div id="buy-action" hidden style="margin-top: 0.75rem;">
                    <button id="buy-item-btn" class="app-btn app-btn--primary app-btn--full" type="button">Comprar</button>
                </div>
                <p id="sold-note" class="status-copy" hidden style="margin-top: 0.6rem; color: var(--muted); font-weight: 700;"></p>
                <div style="margin-top: 0.5rem;">
                    <button id="fav-item-btn" class="app-btn app-btn--ghost" type="button" aria-label="Adicionar aos favoritos" style="gap: 10px;">
                        <svg id="fav-item-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                        <span id="fav-item-label">Guardar nos favoritos</span>
                    </button>
                </div>
                <div class="chip-list" style="margin: 1rem 0 1.25rem;">
                    <span class="chip" id="item-category">Categoria</span>
                    <span class="chip" id="item-condition">Estado</span>
                </div>

                <div class="seller-box">
                    <p><strong>Vendedor:</strong> <span id="item-seller">--</span></p>
                </div>

                <div id="owner-actions" hidden style="margin-top: 1.25rem;">
                    <div class="action-row" style="justify-content: flex-start;">
                        <a id="edit-item-btn" class="app-btn app-btn--soft" href="#">Editar anúncio</a>
                        <button id="delete-item-btn" class="app-btn app-btn--danger-soft" type="button">Apagar anúncio</button>
                    </div>
                </div>
            </article>
        </section>

        <section class="gallery-section" aria-label="Galeria de fotografias do anúncio">
            <h2 class="section-title" style="font-size: 1.45rem; margin-bottom: 16px;">Mais fotografias</h2>
            <div class="gallery-grid" id="item-gallery"></div>
        </section>
    </main>

    <script type="module" src="../js/pages/item.js"></script>
</body>

</html>
