<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../styles/styles.css">
    <title>UniCo - Editar Anúncio</title>
    <meta name="description" content="Edita o teu anúncio na UniCo — atualiza título, descrição, preço e fotografias.">
</head>

<body class="app-page">
    <main class="dashboard-shell" id="main-content">
        <header class="page-toolbar">
            <a class="btn btn--ghost" id="back-btn" href="dashboard.html">Voltar</a>
            <button data-logout-btn class="btn btn--light" type="button">Sair</button>
        </header>

        <section class="surface" style="padding: clamp(1.4rem, 3vw, 2rem);">
            <div class="page-header" style="margin-bottom: 18px;">
                <div>
                    <h1 class="section-title">Editar Anúncio</h1>
                    <p class="section-copy" style="color: var(--muted); margin-top: 0.5rem;">
                        Atualiza os dados do teu anúncio.
                    </p>
                </div>
            </div>

            <form id="edit-form" class="form-stack">

                <div class="admin-section">
                    <h2 class="admin-section__title">Fotografias actuais</h2>
                    <div id="current-images" class="preview-grid" style="margin-top: 10px;"></div>
                </div>

                <div class="upload-dropzone">
                    <label class="form-field-label">Substituir fotografias (opcional)</label>
                    <p class="help-text" style="margin-bottom: 8px;">Se carregares novas fotos, as anteriores serão substituídas. Deixa em branco para manter as atuais.</p>
                    <label class="upload-button" for="listing-images">
                        Carregar fotografias
                        <input class="file-input" type="file" id="listing-images" name="listing-images" accept="image/*" multiple>
                    </label>
                    <span class="file-name" id="file-name">Nenhuma fotografia seleccionada</span>
                    <div id="image-preview" class="preview-grid"></div>
                </div>

                <hr class="section-divider">

                <div class="form-field">
                    <label class="form-field-label" for="listing-title">Título</label>
                    <input class="text-input" type="text" id="listing-title" placeholder="Ex: Livro de Cálculo I" required>
                </div>

                <div class="form-field">
                    <label class="form-field-label" for="listing-description">Descrição</label>
                    <textarea class="text-area" id="listing-description" rows="4"
                        placeholder="Descreve o artigo, menciona detalhes e defeitos (se existirem)..."
                        required></textarea>
                </div>

                <div class="form-grid form-grid--two">
                    <div class="form-field">
                        <label class="form-field-label" for="listing-category">Categoria</label>
                        <select id="listing-category" class="dropdown" required>
                            <option value="" disabled>A carregar...</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label class="form-field-label" for="listing-condition">Estado</label>
                        <select id="listing-condition" class="dropdown" required>
                            <option value="" disabled>Seleciona o estado...</option>
                            <option value="novo">Novo com etiquetas</option>
                            <option value="como_novo">Muito bom / Como novo</option>
                            <option value="bom">Bom</option>
                            <option value="satisfatorio">Satisfatório</option>
                        </select>
                    </div>
                </div>

                <div class="form-field">
                    <label class="form-field-label" for="listing-price">Preço</label>
                    <input class="text-input" type="number" step="0.01" min="0" id="listing-price" name="listing-price" placeholder="0.00" required>
                </div>

                <div class="form-actions">
                    <a class="btn btn--ghost" id="cancel-btn" href="dashboard.html">Cancelar</a>
                    <button type="submit" id="submit-edit-btn" class="btn btn--primary">Guardar alterações</button>
                </div>
            </form>

            <hr class="section-divider" style="margin-top: 2rem;">

            <div class="admin-section" role="region" aria-label="Zona de perigo" style="margin-top: 1.5rem;">
                <h2 class="admin-section__title" style="color: var(--danger, #e53e3e);">Zona de perigo</h2>
                <p class="section-copy" style="color: var(--muted); margin: 0.5rem 0 1rem;">
                    Apagar o anúncio é permanente e não pode ser desfeito.
                </p>
                <button id="delete-listing-btn" class="btn btn--danger-soft" type="button">
                    Apagar anúncio
                </button>
            </div>
        </section>
    </main>

    <nav class="mobile-nav" aria-label="Navegação principal">
        <a class="mobile-nav__link" href="dashboard.html" aria-label="Dashboard"><img src="../assets/icons/Vector.svg" alt="dashboard"></a>
        <a class="mobile-nav__link" href="favorites.html" aria-label="Favoritos"><img src="../assets/icons/Vector1.svg" alt="favoritos"></a>
        <a class="mobile-nav__link" href="publish.html" aria-label="Publicar"><img src="../assets/icons/Vector2.svg" alt="publicar"></a>
        <a class="mobile-nav__link" href="messages.html" aria-label="Mensagens"><img src="../assets/icons/Vector3.svg" alt="mensagens"></a>
        <a class="mobile-nav__link" href="profile.html" aria-label="Perfil"><img src="../assets/icons/Vector4.svg" alt="perfil"></a>
    </nav>

    <script type="module" src="../js/pages/edit.js"></script>
</body>

</html>
