<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../styles/styles.css">
    <title>UniCo - Favoritos</title>
</head>

<body class="app-page">
    <main class="dashboard-shell">
        <header class="dashboard-header panel desktop-brand-bar">
            <a href="dashboard.html" aria-label="Dashboard">
                <img class="desktop-brand-bar__logo" src="../assets/icons/logo.svg" alt="logo">
            </a>

            <div>
                <h1 class="section-title">Os meus favoritos</h1>
                <p id="favorites-status" class="status-copy" style="margin-top: 0.5rem;">A carregar favoritos...</p>
            </div>

            <div class="header-actions">
                <button data-logout-btn class="app-btn app-btn--ghost" type="button">Sair</button>
            </div>
        </header>

        <section class="items-grid" id="favorites-grid" aria-label="Lista de favoritos" style="padding-bottom: 8px;">
            <div class="app-alert app-alert--neutral app-alert--center">A carregar favoritos...</div>
        </section>
    </main>

    <nav class="mobile-nav" role="navigation" aria-label="mobile navigation">
        <a class="mobile-nav__link" href="dashboard.html" aria-label="Dashboard">
            <img src="../assets/icons/Vector.svg" alt="icon dashboard">
        </a>
        <a class="mobile-nav__link mobile-nav__link--active" href="./favorites.html" aria-label="Favoritos">
            <img src="../assets/icons/Vector1.svg" alt="icon favoritos">
        </a>
        <a class="mobile-nav__link" href="publish.html" aria-label="Adicionar">
            <img src="../assets/icons/Vector2.svg" alt="icon add product">
        </a>
        <a class="mobile-nav__link" href="messages.html" aria-label="Mensagens">
            <img src="../assets/icons/Vector3.svg" alt="icon messages">
        </a>
        <a class="mobile-nav__link" href="profile.html" aria-label="Perfil">
            <img src="../assets/icons/Vector4.svg" alt="icon profile">
        </a>
    </nav>

    <script type="module" src="../js/pages/favorites.js"></script>
</body>

</html>
