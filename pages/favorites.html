<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../styles/styles.css">
    <title>UniCo - Favoritos</title>
    <meta name="description" content="Os teus anúncios favoritos na UniCo.">
</head>

<body class="app-page">
    <main class="dashboard-shell" id="main-content">
        <header class="dashboard-header surface desktop-brand-bar" style="background-color: var(--light); border-radius: 16px;">
            <a class="voltar" style="background-color: var(--white);" href="dashboard.html">
                Voltar
            </a>

            <div>
                <h1 class="section-title">Os meus favoritos</h1>
                <p id="favorites-status" class="status-copy" style="margin-top: 0.5rem;">A carregar favoritos...</p>
            </div>

            <button data-logout-btn class="logout" style="background-color: var(--white);" type="button">Sair</button>
            
        </header>

        <section class="listings-grid" id="favorites-grid" aria-label="Lista de favoritos" style="padding-bottom: 8px;">
            <div class="alert alert--neutral alert--center">A carregar favoritos...</div>
        </section>
    </main>

    <nav class="mobile-nav" aria-label="Navegação principal">
        <a class="mobile-nav__link" href="dashboard.html" aria-label="Dashboard">
            <img src="../assets/icons/Vector.svg" alt="icon dashboard">
        </a>
        <a class="mobile-nav__link" href="./favorites.html" aria-label="Favoritos">
            <img src="../assets/icons/Vector1.svg" alt="icon favoritos">
        </a>
        <a class="mobile-nav__link" href="publish.html" aria-label="Adicionar">
            <img src="../assets/icons/Vector2.svg" alt="icon add product">
        </a>
        <a class="mobile-nav__link" href="messages.html" aria-label="Mensagens">
            <img src="../assets/icons/Vector3.svg" alt="icon messages">
        </a>
        <a class="mobile-nav__link" href="profile.html" aria-label="Perfil">
            <img src="../assets/icons/Vector4.svg" alt="icon profile">
        </a>
    </nav>

    <script type="module" src="../js/pages/favorites.js"></script>
</body>

</html>
