<!DOCTYPE html>
<html lang="pt-PT" class="has-navbar-fixed-top">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="../styles/bulma.css">
</head>

<body>

        <section class="hero is-primary is-fullheight">
            <div class="hero-body">
                <div class="container">
                    <div class="columns is-mobile is-vcentered mb-4">
                        <div class="column">
                            <a class="button is-light is-rounded" href="dashboard.html">Voltar</a>
                        </div>
                        <div class="column is-narrow">
                            <button data-logout-btn class="button is-white is-rounded" type="button">Sair</button>
                        </div>
                    </div>
                <div class="columns is-centered">
                    <div class="column is-10-tablet is-6-desktop">
                        <div class="card">
                            <div class="card-content has-text-primary has-background-white">
                                <h2 class="title is-4 has-text-primary">Publicar Novo Artigo</h2>

                                <form id="publish-form">
                                    <div class="field ">
                                        <label class="label has-text-black">Adiciona até 5 fotos</label>
                                        <div class="control">
                                            <div class="file has-name is-boxed">
                                                <label class="file-label">
                                                    <input class="file-input" type="file" name="item-images" accept="image/*"
                                                        multiple>
                                                    <span class="file-cta">
                                                        <span class="file-icon">
                                                            <i class="fas fa-camera"></i>
                                                        </span>
                                                        <span class="file-label has-text-white">Carregar fotografias</span>
                                                    </span>
                                                    <span class="file-name has-text-black" id="file-name">Nenhuma fotografia seleccionada</span>
                                                </label>
                                            </div>
                                        </div>
                                        <div id="image-preview" class="columns is-mobile is-multiline mt-3"></div>
                                    </div>

                                    <hr>

                                    <div class="field">
                                        <label class="label has-text-black">Título</label>
                                        <div class="control">
                                            <input class="input" type="text" id="item-title" placeholder="Ex: Livro de Cálculo I"
                                                required>
                                        </div>
                                        <p class="help">Usa um título claro para encontrarem o teu artigo facilmente.</p>
                                    </div>

                                    <div class="field">
                                        <label class="label has-text-black">Descrição</label>
                                        <div class="control">
                                            <textarea class="textarea" id="item-description" rows="4"
                                                placeholder="Descreve o artigo, menciona detalhes e defeitos (se existirem)..." required></textarea>
                                        </div>
                                    </div>

                                    <hr>

                                    <div class="columns is-multiline">
                                        <div class="column is-6">
                                            <div class="field">
                                                <label class="label has-text-black">Categoria</label>
                                                <div class="control">
                                                    <div class="select is-fullwidth">
                                                        <select id="item-category" required>
                                                            <option value="" disabled selected>Carregando categorias...</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="column is-6">
                                            <div class="field">
                                                <label class="label has-text-black">Estado</label>
                                                <div class="control">
                                                    <div class="select is-fullwidth">
                                                        <select id="item-condition" required>
                                                            <option value="" disabled selected>Seleciona o estado...</option>
                                                            <option value="novo">Novo com etiquetas</option>
                                                            <option value="como_novo">Muito bom / Como novo</option>
                                                            <option value="bom">Bom</option>
                                                            <option value="satisfatorio">Satisfatório</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <hr>

                                    <div class="field">
                                        <label class="label has-text-black">Preço</label>
                                        <div class="control has-icons-right">
                                            <input class="input is-large has-text-weight-bold" type="number" step="0.01" id="item-price"
                                                placeholder="0.00" required>
                                            <span class="icon is-small is-right">
                                                <i class="fas fa-euro-sign"></i>
                                            </span>
                                        </div>
                                    </div>

                                    <div class="field is-grouped is-grouped-right">
                                        <p class="control">
                                            <a class="button is-light" href="dashboard.html">Cancelar</a>
                                        </p>
                                        <p class="control is-expanded">
                                            <button type="submit" id="submit-item-btn" class="button is-primary is-fullwidth has-text-weight-bold has-text-white">Publicar Anúncio</button>
                                        </p>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="../js/auth-guard.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/item.js"></script>

</body>

</html>
