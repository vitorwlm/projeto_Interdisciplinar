<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
    <title>UniCo - Publicar Anúncio</title>
</head>

<body class="app-page">
    <main class="dashboard-shell">
        <header class="page-toolbar">
            <a class="app-btn app-btn--ghost" href="dashboard.html">Voltar</a>
            <button data-logout-btn class="app-btn app-btn--light" type="button">Sair</button>
        </header>

        <section class="panel" style="padding: clamp(1.4rem, 3vw, 2rem);">
            <div class="page-header" style="margin-bottom: 18px;">
                <div>
                    <h1 class="section-title">Publicar Novo Artigo</h1>
                    <p class="section-copy" style="color: var(--muted); margin-top: 0.5rem;">
                        Preenche os dados do anúncio e adiciona até 5 fotografias.
                    </p>
                </div>
            </div>

            <form id="publish-form" class="form-stack">
                <div class="upload-dropzone">
                    <label class="field-label">Adiciona até 5 fotos</label>
                    <label class="upload-button" for="item-images">
                        Carregar fotografias
                        <input class="file-input" type="file" id="item-images" name="item-images" accept="image/*" multiple>
                    </label>
                    <span class="file-name" id="file-name">Nenhuma fotografia seleccionada</span>
                    <div id="image-preview" class="preview-grid"></div>
                </div>

                <hr class="section-divider">

                <div class="field">
                    <label class="field-label" for="item-title">Título</label>
                    <input class="app-input" type="text" id="item-title" placeholder="Ex: Livro de Cálculo I" required>
                    <p class="help-text">Usa um título claro para encontrarem o teu artigo facilmente.</p>
                </div>

                <div class="field">
                    <label class="field-label" for="item-description">Descrição</label>
                    <textarea class="app-textarea" id="item-description" rows="4" placeholder="Descreve o artigo, menciona detalhes e defeitos (se existirem)..." required></textarea>
                </div>

                <div class="field-grid field-grid--two">
                    <div class="field">
                        <label class="field-label" for="item-category">Categoria</label>
                        <select id="item-category" class="app-select" required>
                            <option value="" disabled selected>Carregando categorias...</option>
                        </select>
                    </div>

                    <div class="field">
                        <label class="field-label" for="item-condition">Estado</label>
                        <select id="item-condition" class="app-select" required>
                            <option value="" disabled selected>Seleciona o estado...</option>
                            <option value="novo">Novo com etiquetas</option>
                            <option value="como_novo">Muito bom / Como novo</option>
                            <option value="bom">Bom</option>
                            <option value="satisfatorio">Satisfatório</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="item-price">Preço</label>
                    <input class="app-input" type="number" step="0.01" id="item-price" placeholder="0.00" required>
                </div>

                <div class="form-actions">
                    <a class="app-btn app-btn--ghost" href="dashboard.html">Cancelar</a>
                    <button type="submit" id="submit-item-btn" class="app-btn app-btn--primary">Publicar Anúncio</button>
                </div>
            </form>
        </section>
    </main>

    <script type="module" src="../js/auth-guard.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/item.js"></script>

</body>

</html>
