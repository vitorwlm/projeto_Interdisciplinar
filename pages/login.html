<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="../styles/global.css">
    <title>UniCo - Iniciar Sessão</title>
    <meta name="description" content="Inicia sessão na UniCo, a comunidade de economia circular do teu campus.">
</head>

<body class="bgimg">

    <div class="voltar-cont">

        <a href="../index.html" class="voltar">Voltar</a>

        <img src="../assets/icons/logo.svg" class="logo" alt="logo">

    </div>

    <div class="card">

        <h1>Iniciar Sessão</h1>

        <form id="login-form">

            <div class="input-cont">
                <label for="email">E-mail Académico</label>
                <input type="email" id="email" class="input" placeholder="user@esmad.ipp.pt" autocomplete="email" required>
            </div>

            <div class="input-cont">
                <label for="password">Palavra-passe</label>
                <input type="password" id="password" class="password" placeholder="palavra passe" autocomplete="current-password" required>
            </div>

            <button type="submit" id="enter" class="entrar">Entrar</button>

            <p class="criar-conta">Não tens conta? <a href="register.html">Cria uma aqui.</a></p>

        </form>

    </div>

    <script type="module" src="../js/pages/auth.js"></script>
</body>

</html>
