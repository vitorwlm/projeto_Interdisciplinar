<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="../styles/bulma.css">
    <title> UniCo - Iniciar Sessão</title>
</head>

<body>

    <section class="hero is-primary is-fullheight has-background-primary">
        <div class="hero-body ">
            <div class="container">
                <div class="columns is-mobile is-vcentered mb-5">
                    <div class="column is-narrow">
                        <a class="button is-white is-rounded" href="../index.html">Voltar</a>
                    </div>
                    <div class="column has-text-centered">
                        <figure class="image is-96x96 is-inline-block">
                            <img src="../assets/icons/logo.svg" alt="UniCo Logo">
                        </figure>
                    </div>
                    <div class="column is-narrow"></div>
                </div>

                <div class="columns is-centered">
                    <div class="column is-8-tablet is-5-desktop">
                        <div class="card has-background-white ">
                            <div class="card-content">
                                <h1 class="title is-4 has-text-centered has-text-primary">Iniciar Sessão</h1>
                                <p class="subtitle is-6 mt-4 has-text-centered mb-5 has-text-dark">Bem-vindo de volta à comunidade de economia circular do teu campus.</p>

                                <form id="login-form">
                                    <div class="field">
                                        <label class="label has-text-black" for="email">E-mail Académico</label>
                                        <div class="control">
                                            <input class="input has-background-light " type="email" id="email"
                                                placeholder="utilizador@esmad.ipp.pt" required>
                                        </div>
                                    </div>

                                    <div class="field">
                                        <label class="label has-text-black" for="password">Palavra-passe</label>
                                        <div class="control">
                                            <input class="input has-background-light" type="password" id="password"
                                                placeholder="A tua palavra-passe" required>
                                        </div>
                                    </div>

                                    <div class="field mt-5">
                                        <div class="control">
                                            <button type="submit"
                                                class="button is-primary is-fullwidth has-text-white">Entrar</button>
                                        </div>
                                    </div>
                                </form>

                                <div class="has-text-centered mt-4">
                                    <p class="is-size-7 has-text-dark">
                                        Ainda não tens conta?
                                        <a href="register.html" class="has-text-primary">
                                            Cria uma aqui
                                        </a>
                                    </p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="../js/auth-guard.js"></script>
    <script type="module" src="../js/auth.js"></script>
</body>

</html>
