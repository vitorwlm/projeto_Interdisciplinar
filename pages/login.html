<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../styles/styles.css">
    <title> UniCo - Iniciar Sessão</title>
</head>

<body class="auth-page">
    <main class="auth-shell">
        <header class="auth-header">
            <a class="app-btn app-btn--light" href="../index.html">Voltar</a>
            <div class="auth-brand">
                <img class="auth-logo" src="../assets/icons/logo.svg" alt="UniCo Logo">
            </div>
            <span aria-hidden="true"></span>
        </header>

        <section class="auth-card" aria-label="Formulário de início de sessão">
            <h1 class="section-title">Iniciar Sessão</h1>
            <p class="section-copy" style="color: var(--muted); margin-top: 0.75rem;">
                Bem-vindo de volta à comunidade de economia circular do teu campus.
            </p>

            <form id="login-form" class="form-stack">
                <div class="field">
                    <label class="field-label" for="email">E-mail Académico</label>
                    <input class="app-input" type="email" id="email" placeholder="utilizador@esmad.ipp.pt" required>
                </div>

                <div class="field">
                    <label class="field-label" for="password">Palavra-passe</label>
                    <input class="app-input" type="password" id="password" placeholder="A tua palavra-passe" required>
                </div>

                <button type="submit" class="app-btn app-btn--primary app-btn--full">Entrar</button>
            </form>

            <p class="auth-footer">
                Ainda não tens conta?
                <a href="register.html" class="text-accent">Cria uma aqui</a>
            </p>
        </section>
    </main>

    <script type="module" src="../js/pages/auth.js"></script>
</body>

</html>
