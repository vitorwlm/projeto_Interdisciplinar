<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
    <title>UniCo - Dashboard</title>
</head>

<body class="app-page">
    <main class="dashboard-shell">
        <header class="dashboard-header panel desktop-brand-bar">
            <a href="dashboard.html" aria-label="Dashboard">
                <img class="desktop-brand-bar__logo" src="../assets/icons/logo.svg" alt="logo">
            </a>

            <div>
                <h1 class="section-title">Anúncios da App</h1>
                <p id="items-status" class="status-copy" style="margin-top: 0.5rem;">A carregar anúncios...</p>
            </div>

            <div class="header-actions">
                <a class="app-btn app-btn--primary" href="publish.html">Publicar anúncio</a>
                <a id="admin-panel-link" class="app-btn app-btn--soft" href="admin.html" hidden>Painel admin</a>
                <button data-logout-btn class="app-btn app-btn--ghost" type="button">Sair</button>
            </div>
        </header>

        <section class="items-grid" id="items-grid" aria-label="Lista de anúncios">
            <div class="app-alert app-alert--neutral app-alert--center">A carregar anúncios...</div>
        </section>
    </main>

    <nav class="mobile-nav" role="navigation" aria-label="mobile navigation">
        <a class="mobile-nav__link" href="dashboard.html" aria-label="Dashboard">
            <img src="../assets/icons/Vector.svg" alt="icon dashboard">
        </a>
        <a class="mobile-nav__link" href="#" aria-label="Loja">
            <img src="../assets/icons/Vector1.svg" alt="icon shopping">
        </a>
        <a class="mobile-nav__link" href="publish.html" aria-label="Adicionar">
            <img src="../assets/icons/Vector2.svg" alt="icon add product">
        </a>
        <a class="mobile-nav__link" href="#" aria-label="Mensagens">
            <img src="../assets/icons/Vector3.svg" alt="icon messages">
        </a>
        <a class="mobile-nav__link" href="#" aria-label="Perfil">
            <img src="../assets/icons/Vector4.svg" alt="icon profile">
        </a>
    </nav>

    <script type="module" src="../js/auth-guard.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/dashboard.js"></script>
</body>

</html>
