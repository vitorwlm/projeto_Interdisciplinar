<!DOCTYPE html>
<html lang="pt-PT" class="has-navbar-fixed-top has-navbar-fixed-bottom">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="../styles/bulma.css">

    <title>UniCo - Dashboard</title>

</head>

<body>

    <section class="section pt-6 pb-6">
        <div class="container">
            <div class="columns is-mobile is-vcentered mb-5">
                <div class="column">
                    <h1 class="title is-3 mb-2">Anúncios da App</h1>
                    <p class="subtitle is-6" id="items-status">A carregar anúncios...</p>
                </div>
                <div class="column is-narrow">
                    <div class="buttons is-right">
                        <a class="button is-primary is-rounded" href="publish.html">Publicar anúncio</a>
                        <button data-logout-btn class="button is-light is-rounded" type="button">Sair</button>
                    </div>
                </div>
            </div>

            <div class="columns is-multiline" id="items-grid">
                <div class="column is-12">
                    <div class="notification is-light has-text-centered">A carregar anúncios...</div>
                </div>
            </div>
        </div>
    </section>

                <!-- Mobile bottom nav -->
                <nav class="navbar is-hidden-desktop is-fixed-bottom has-background-white" role="navigation" aria-label="mobile navigation">
                    <div class="container">
                        <div class="columns is-mobile is-gapless is-vcentered pt-1">
                            <div class="column has-text-centered py-3">
                                <a class="is-block" href="dashboard.html" aria-label="Dashboard">
                                    <figure class="image is-32x32 is-inline-block">
                                        <img src="../assets/icons/Vector.svg" alt="icon dashboard">
                                    </figure>
                                </a>
                            </div>
                            <div class="column has-text-centered py-3">
                                <a class="is-block" href="#" aria-label="Loja">
                                    <figure class="image is-32x32 is-inline-block">
                                        <img src="../assets/icons/Vector1.svg" alt="icon shopping">
                                    </figure>
                                </a>
                            </div>
                            <div class="column has-text-centered py-3">
                                <a class="is-block" href="publish.html" aria-label="Adicionar">
                                    <figure class="image is-48x48 is-inline-block">
                                        <img src="../assets/icons/Vector2.svg" alt="icon add product">
                                    </figure>
                                </a>
                            </div>
                            <div class="column has-text-centered py-3">
                                <a class="is-block" href="#" aria-label="Mensagens">
                                    <figure class="image is-32x32 is-inline-block">
                                        <img src="../assets/icons/Vector3.svg" alt="icon messages">
                                    </figure>
                                </a>
                            </div>
                            <div class="column has-text-centered py-3">
                                <a class="is-block" href="#" aria-label="Perfil">
                                    <figure class="image is-32x32 is-inline-block">
                                        <img src="../assets/icons/Vector4.svg" alt="icon profile">
                                    </figure>
                                </a>
                            </div>
                        </div>
                    </div>
                </nav>

                <nav class="navbar is-hidden-mobile is-fixed-top has-background-primary">
                    <div class="container pt-4 ">
                        <a class="is-block" href="dashboard.html">
                            <figure class="image is-inline-block">
                                <img src="../assets/icons/logo.svg" alt="logo">
                            </figure>
                        </a>
                    </div>
                </nav>

                <script type="module" src="../js/auth-guard.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/dashboard.js"></script>
</body>

</html>
