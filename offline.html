    <title>UniCo - Sem ligação</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 22px;
            padding: 28px;
            background-color: #2C2A9B;
            color: #ffffff;
            font-family: Montserrat, system-ui, -apple-system, sans-serif;
        }

        .offline-logo { width: 150px; height: auto; opacity: 0.95; }

        h1 { font-size: clamp(1.6rem, 6vw, 2.2rem); font-weight: 900; }

        p { font-size: 1.05rem; max-width: 420px; line-height: 1.5; color: #EAE9F5; }

        button {
            margin-top: 4px;
            height: 50px;
            padding: 0 30px;
            background-color: #ffffff;
            color: #2C2A9B;
            border: none;
            border-radius: 30px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3); }
    </style>
