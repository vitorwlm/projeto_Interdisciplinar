<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="./styles/bulma.css">
    <title>UniCo</title>
</head>

<body>
    <section class="hero is-primary is-fullheight has-background-primary">
        <div class="hero-body">
            <div class="container">
                <div class="columns is-mobile is-vcentered mb-5">
                    <div class="column is-narrow"></div>
                    <div class="column has-text-centered">
                        <figure class="image is-96x96 is-inline-block">
                            <img src="./assets/icons/logo.svg" alt="UniCo Logo">
                        </figure>
                    </div>
                    <div class="column is-narrow"></div>
                </div>

                <div class="columns is-centered">
                    <div class="column is-10-mobile is-8-tablet is-5-desktop has-text-centered">
                        <h1 class="title is-3 has-text-white">UniCo</h1>
                        <p class="subtitle is-6 has-text-white mb-6">
                            A comunidade de economia circular do teu campus.
                        </p>
                        <div class="buttons is-centered are-large">
                            <a href="./pages/login.html?skipRedirect=1" class="button is-white is-rounded has-text-primary is-fullwidth mb-3">
                                <strong>Login</strong>
                            </a>
                            <a href="./pages/register.html?skipRedirect=1" class="button is-white is-outlined is-rounded is-fullwidth">
                                <strong>Register</strong>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
    <script type="module" src="./js/auth-guard.js"></script>
</body>

</html>
