<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./styles/styles.css">
    <title>UniCo</title>
</head>

<body class="landing-page">
    <main class="landing-shell">
        <section class="landing-card" aria-label="UniCo entrada">
            <div class="landing-brand">
                <img class="landing-logo" src="./assets/icons/logo.svg" alt="UniCo Logo">
            </div>

            <h1 class="landing-title">UniCo</h1>
            <p class="landing-copy">
                A comunidade de economia circular do teu campus.
            </p>

            <div class="landing-actions">
                <a href="./pages/login.html?skipRedirect=1" class="app-btn app-btn--light app-btn--full">
                    Login
                </a>
                <a href="./pages/register.html?skipRedirect=1" class="app-btn app-btn--outline app-btn--full">
                    Registar
                </a>
            </div>
        </section>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
    <script type="module" src="./js/auth-guard.js"></script>
</body>

</html>
