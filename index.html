<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2C2A9B">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="./styles/bulma.css">
    <title>UniCo</title>
</head>

<body>
    <section class="hero is-primary is-fullheight">
        <div class="hero-body">
            <div class="container">
                <div class="columns is-centered is-mobile">
                    <div
                        class="column is-three-quarters-mobile is-half-tablet is-one-third-desktop is-one-quarter-widescreen">
                        <figure class="image is-square">
                            <img src="./assets/icons/logo.svg" alt="UniCo">
                        </figure>
                    </div>
                </div>
            </div>
        </div>
        <div class="hero-foot pb-6 px-5">
            <div class="container">
                <div class="buttons is-centered are-large   ">
                    <a href="./pages/login.html" class="button is-white is-rounded has-text-primary is-fullwidth mb-3">
                        <strong>Login</strong>
                    </a>
                    <a href="./pages/register.html" class="button is-white is-outlined is-rounded is-fullwidth is-hovered">
                        <strong>Register</strong>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>

</html>
